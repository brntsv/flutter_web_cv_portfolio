name: ui_kit
description: "UiKit package for Realt One project"
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  # Стандартный пакет флаттер-а.
  flutter:
    sdk: flutter
  # Пакет навигации.
  auto_route: ^10.1.0+1
  utils:
    path: ../utils
  flutter_svg: ^2.2.0


dev_dependencies:
  # Пакет для поддержки кодогенерации.
  build_runner: ^2.4.15
  # Пакет для кодогенерации для ассетов - цвета, шрифты, иконки, изображения.
  flutter_gen_runner: ^5.10.0
  # Пакет с набором правил линтера.
  flutter_lints: ^6.0.0


flutter_gen:
  output: lib/assets
  assets:
    outputs:
      package_parameter_enabled: true
  colors:
    enabled: true
    outputs:
      class_name: UiKitColor
    inputs:
      - assets/color/colors.xml
  fonts:
    enabled: true


flutter:
  uses-material-design: true
  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf

