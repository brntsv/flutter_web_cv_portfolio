<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter Developer">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Никита Баранцев">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Никита Баранцев</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <script>
    (function () {
      if (window.__tpd_bound) return;
      window.__tpd_bound = true;

      var ua = navigator.userAgent || '';
      var isTelegram = /Telegram/i.test(ua);
      if (!isTelegram) return;

      var startY = 0;

      // По умолчанию считаем, что на верху (разрешаем dismiss)
      document.documentElement.setAttribute('data-tpd-at-top', '1');

      function onTouchStart(e) {
        if (!isTelegram) return;
        if (!e.touches || e.touches.length !== 1) return;
        startY = e.touches[0].clientY;
      }

      function onTouchMove(e) {
        if (!isTelegram) return;
        if (!e.touches || e.touches.length !== 1) return;
        var dy = e.touches[0].clientY - startY;

        var atTopFlag = document.documentElement.getAttribute('data-tpd-at-top') === '1';

        if (dy > 3 && !atTopFlag) {
          e.preventDefault();
        }
      }

      var opts = { capture: true, passive: false };
      window.addEventListener('touchstart', onTouchStart, opts);
      window.addEventListener('touchmove', onTouchMove, opts);
      document.addEventListener('touchstart', onTouchStart, opts);
      document.addEventListener('touchmove', onTouchMove, opts);

      if (document.body) {
        document.body.addEventListener('touchstart', onTouchStart, opts);
        document.body.addEventListener('touchmove', onTouchMove, opts);
      } else {
        document.addEventListener('DOMContentLoaded', function () {
          document.body.addEventListener('touchstart', onTouchStart, opts);
          document.body.addEventListener('touchmove', onTouchMove, opts);
        });
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
